server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # same-origin from the browser's perspective -- nginx proxies server-side,
    # so the frontend's relative /api/* calls need no CORS config at all here.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
